<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trang đăng ký band nhạc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
</head>
<body>
    <div class="w3-top">
        <div class="w3-bar w3-black">
            <a href="#" class="w3-bar-item w3-button">HOME</a>
            <a href="#band" class="w3-bar-item w3-button">BAND</a>
            <a href="#tour" class="w3-bar-item w3-button">TOUR</a>
            <a href="#contact" class="w3-bar-item w3-button">CONTACT</a>
        </div>
    </div>
    <div class="w3-content" style="max-width:2000px;margin-top:46px">
        <img class="mySlides" src="https://i.pinimg.com/736x/63/b3/4b/63b34b309a63a18b5109d83416963f6d.jpg"
            style="width:100%">
        <img class="mySlides" src="https://cdn.hmmagazine.com/wp-content/uploads/2023/03/22135959/DSC03147-scaled.jpg"
            style="width:100%">
        <img class="mySlides" src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a" style="width:100%">
    </div>
    <div class="w3-container w3-padding-64 w3-center" id="band">
        <h2>THE BAND</h2>
        <p>
            If you have a passion for music but don't know where to express it,
            register and you will get to experience your love for music.
        </p>
        <div class="w3-row">
            <div class="w3-third">
                <p>Name</p>
                <img src="https://www.shutterstock.com/image-vector/happy-kid-play-drum-music-600w-1487397077.jpg"
                    class="w3-round" style="width:60%">
            </div>
            <div class="w3-third">
                <p>Name</p>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKp7MwmyItrEQ4B5In7hpfZsUk05MJ6lx-UQ&s"
                    class="w3-round" style="width:60%">
            </div>
            <div class="w3-third">
                <p>Name</p>
                <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d" class="w3-round"
                    style="width:60%">
            </div>
        </div>
    </div>
    <div class="w3-black" id="tour">
        <div class="w3-container w3-padding-64">
            <h2 class="w3-center">TOUR DATES</h2>
            <ul class="w3-ul w3-white">
                <li>September <span class="w3-tag w3-red">Sold out</span></li>
                <li>October <span class="w3-tag w3-red">Sold out</span></li>
                <li>November <span class="w3-badge w3-right w3-margin-right">3</span></li>
            </ul>
        </div>
    </div>
    <div class="w3-container w3-padding-64" id="contact">
        <h2 class="w3-center">CONTACT</h2>
        <div class="w3-row">
            <div class="w3-half">
                <p>Email: dang36716@mail.com</p>
            </div>

            <div class="w3-half">
                <input class="w3-input w3-border" type="text" placeholder="Name">

                <input class="w3-input w3-border" type="text" placeholder="Email">

                <button class="w3-button w3-black w3-margin-top">
                    SEND
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
