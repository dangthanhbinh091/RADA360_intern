        let slideIndex = 0;

        function carousel() {
            let i;
            let x = document.getElementsByClassName("mySlides");

                x[i].style.display = "none";

            slideIndex++;
            if (slideIndex > x.length) { slideIndex = 1 }
            x[slideIndex - 1].style.display = "block";
            setTimeout(carousel, 3000);
